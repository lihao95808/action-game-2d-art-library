<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Action Game 2D 序列帧审片</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1320;
      --panel: #151f2f;
      --panel2: #1c2a3f;
      --line: #304764;
      --text: #eef4ff;
      --muted: #aebdd2;
      --accent: #ffd166;
      --good: #43d17a;
      --bad: #ff6b6b;
      --blue: #65b8ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text); }
    header { position: sticky; top: 0; z-index: 20; background: rgba(13,19,32,.96); border-bottom: 1px solid var(--line); backdrop-filter: blur(12px); }
    .top { padding: 18px clamp(14px, 4vw, 32px); display: grid; gap: 12px; }
    .title-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    h1 { margin: 0; font-size: clamp(22px, 4vw, 34px); }
    .summary, .small, .meta { color: var(--muted); line-height: 1.55; font-size: 13px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav a { color: var(--text); text-decoration: none; border: 1px solid var(--line); background: var(--panel2); border-radius: 999px; padding: 7px 12px; }
    .nav a.active { background: #315f95; }
    .mobile-tools-toggle { display: none; }
    .tools-panel { display: grid; gap: 10px; }
    .toolbar { display: grid; grid-template-columns: 1.5fr repeat(4, minmax(120px, .7fr)); gap: 10px; }
    input, select, textarea, button {
      width: 100%; border: 1px solid var(--line); border-radius: 8px; background: #0f1726; color: var(--text);
      min-height: 40px; padding: 8px 10px; font: inherit;
    }
    button { cursor: pointer; background: var(--panel2); touch-action: manipulation; }
    button.primary { background: #315f95; }
    button.warn { background: #543143; }
    details.sync { border: 1px solid var(--line); background: rgba(255,255,255,.025); border-radius: 8px; padding: 10px; }
    details.sync summary { cursor: pointer; color: var(--accent); }
    .sync-grid { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
    .sync-actions, .actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
    main { width: min(1500px, calc(100vw - 24px)); margin: 0 auto; padding: 18px 0 52px; }
    .stats { display: flex; flex-wrap: wrap; gap: 8px; color: var(--muted); }
    .pill { border: 1px solid var(--line); border-radius: 999px; padding: 5px 10px; background: rgba(255,255,255,.03); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 14px; }
    .card { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: var(--panel); }
    .card[data-hidden="true"] { display: none; }
    .previewRow { display: grid; grid-template-columns: 170px minmax(0, 1fr); gap: 12px; padding: 12px; align-items: start; }
    .animBox { display: grid; place-items: center; background: #0a0f1a; border: 1px solid var(--line); border-radius: 8px; min-height: 206px; }
    .animBox img { max-width: 100%; max-height: 230px; image-rendering: auto; }
    h2 { margin: 0 0 6px; font-size: 19px; }
    .sheet { width: 100%; max-height: 210px; object-fit: contain; background: #0a0f1a; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); display: block; }
    .frameStrip { display: flex; gap: 6px; overflow-x: auto; padding: 10px 12px; background: rgba(0,0,0,.18); }
    .frameStrip figure { margin: 0; min-width: 58px; text-align: center; color: var(--muted); font-size: 11px; }
    .frameStrip img { width: 58px; height: 66px; object-fit: contain; background: #101827; border: 1px solid var(--line); border-radius: 6px; }
    .body { padding: 12px; display: grid; gap: 9px; }
    .paramGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .paramGrid label { display: grid; gap: 4px; color: var(--muted); font-size: 12px; }
    .issues { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; font-size: 12px; }
    .issues label { display: flex; gap: 7px; align-items: center; color: var(--muted); }
    .issues input { width: auto; min-height: auto; }
    textarea { min-height: 64px; resize: vertical; }
    .current { outline: 3px solid var(--good); }
    .status-pass, .status-final { outline: 3px solid var(--good); }
    .status-candidate { outline: 3px solid var(--blue); }
    .status-reextract { outline: 3px solid var(--accent); }
    .status-regenerate, .status-rejected { opacity: .64; outline: 3px solid var(--bad); }
    @media (max-width: 820px) {
      .toolbar, .sync-grid { grid-template-columns: 1fr 1fr; }
      .toolbar input { grid-column: 1 / -1; }
      .sync-actions, .actions { grid-template-columns: 1fr 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      header { position: static; }
      .top { padding: 12px; }
      h1 { font-size: 20px; line-height: 1.15; }
      .summary { display: none; }
      .mobile-tools-toggle { display: block; width: auto; min-width: 118px; padding-inline: 12px; }
      .tools-panel { display: none; }
      .tools-panel.open { display: grid; gap: 8px; }
      main { width: calc(100vw - 14px); padding-top: 10px; }
      .toolbar, .sync-grid, .sync-actions, .actions, .paramGrid, .issues { grid-template-columns: 1fr; }
      input, select, textarea, button { min-height: 44px; font-size: 16px; }
      .previewRow { grid-template-columns: 1fr; }
      .animBox { min-height: 250px; }
      .sheet { max-height: 180px; }
      .stats { flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none; }
      .stats::-webkit-scrollbar { display: none; }
      .stats .pill { white-space: nowrap; font-size: 12px; padding: 4px 8px; }
      .stats .pill:nth-child(n+3) { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <div>
        <div class="title-row">
          <h1>Action Game 2D 序列帧审片</h1>
          <button class="mobile-tools-toggle" id="mobileToolsToggle" type="button" aria-expanded="false" aria-controls="mobileToolsPanel">筛选 / 工具</button>
        </div>
        <div class="nav">
          <a href="index.html">图片评审</a>
          <a class="active" href="sequences.html">序列帧审片</a>
        </div>
        <div class="summary">手机端优先看动图、做选择和写备注；桌面端可进一步调 loop、fps、端点混合等轻量参数。真实生成和重抽帧仍由 Codex 执行。</div>
      </div>
      <div class="tools-panel" id="mobileToolsPanel">
        <div class="toolbar">
          <input id="search" placeholder="搜索角色、动作、版本、备注">
          <select id="character"><option value="">全部角色</option></select>
          <select id="action"><option value="">全部动作</option></select>
          <select id="status"><option value="">全部状态</option></select>
          <select id="version"><option value="">全部版本</option></select>
        </div>
        <div class="actions">
          <button class="primary" id="exportReview">导出序列帧 JSON</button>
          <button id="importReview">导入 JSON</button>
          <button id="syncJobs">同步生成请求队列</button>
          <button class="warn" id="clearFilters">清空筛选</button>
        </div>
        <details class="sync">
          <summary>GitHub 云同步</summary>
          <div class="sync-grid">
            <input id="cloudRepo" value="lihao95808/action-game-2d-art-library" placeholder="owner/repo">
            <input id="cloudBranch" value="main" placeholder="branch">
            <input id="cloudReviewer" value="duzuguang" placeholder="评审者">
            <input id="cloudToken" type="password" placeholder="GitHub token，仅保存在本浏览器">
          </div>
          <div class="sync-actions">
            <button id="pullCloud">拉取云端</button>
            <button class="primary" id="pushCloud">立即同步</button>
            <button id="saveCloudSettings">保存设置</button>
            <button class="warn" id="clearCloudToken">清除 Token</button>
          </div>
          <div class="small" id="syncStatus">本地已保存，尚未连接云同步。</div>
        </details>
      </div>
      <div class="stats" id="stats"></div>
    </div>
  </header>
  <main><div class="grid" id="grid"></div></main>
  <input id="reviewFile" type="file" accept=".json,application/json" hidden>
