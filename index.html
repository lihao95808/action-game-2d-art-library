<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Action Game 2D 创作评审工作台</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1320;
      --panel: #151f2f;
      --panel2: #1c2a3f;
      --line: #304764;
      --text: #eef4ff;
      --muted: #aebdd2;
      --accent: #ffd166;
      --good: #43d17a;
      --blue: #65b8ff;
      --warn: #ff9f6e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    button, input, select {
      font: inherit;
      color: var(--text);
      background: #0f1726;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 40px;
    }
    button { cursor: pointer; padding: 8px 11px; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }
    aside {
      border-right: 1px solid var(--line);
      background: #101827;
      padding: 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .brand { display: grid; gap: 8px; margin-bottom: 16px; }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; line-height: 1.16; }
    .subtitle { color: var(--muted); line-height: 1.55; font-size: 13px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 14px 0 18px; }
    .stat {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      border-radius: 8px;
      padding: 9px;
    }
    .stat strong { display: block; font-size: 22px; line-height: 1; }
    .stat span { color: var(--muted); font-size: 12px; }
    .module-list { display: grid; gap: 9px; }
    .module-button {
      width: 100%;
      text-align: left;
      display: grid;
      gap: 5px;
      background: var(--panel);
      border-color: var(--line);
      padding: 11px;
    }
    .module-button.active { border-color: var(--blue); background: #1b3350; }
    .module-button[disabled] { opacity: .5; cursor: not-allowed; }
    .module-name { font-weight: 700; }
    .module-meta { color: var(--muted); font-size: 12px; line-height: 1.45; }
    .module-badge {
      justify-self: start;
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 12px;
      color: #0d1320;
      background: var(--accent);
    }
    .module-button.active .module-badge { background: var(--good); }
    main { min-width: 0; display: grid; grid-template-rows: auto minmax(0, 1fr); }
    header {
      border-bottom: 1px solid var(--line);
      background: rgba(13,19,32,.96);
      padding: 14px 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }
    h2 { margin: 0; font-size: 21px; letter-spacing: 0; }
    .module-desc { margin-top: 4px; color: var(--muted); line-height: 1.5; font-size: 13px; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .header-actions a, .header-actions button {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 40px;
      padding: 8px 11px;
      display: inline-flex;
      align-items: center;
      background: var(--panel2);
    }
    .workspace { min-height: 0; display: grid; }
    iframe {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 86px);
      border: 0;
      background: var(--bg);
    }
    .empty-module {
      padding: 22px;
      display: grid;
      align-content: start;
      gap: 12px;
      max-width: 860px;
    }
    .empty-module .panel {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 8px;
      padding: 16px;
      line-height: 1.7;
      color: var(--muted);
    }
    .mobile-switch { display: none; padding: 12px; border-bottom: 1px solid var(--line); background: #101827; }
    .mobile-switch select { width: 100%; padding: 8px 10px; }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      aside { display: none; }
      .mobile-switch { display: block; }
      header { grid-template-columns: 1fr; }
      .header-actions { justify-content: flex-start; }
      iframe { min-height: calc(100vh - 168px); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <h1>Action Game 2D 创作评审工作台</h1>
        <div class="subtitle">一个 GitHub Pages 入口承载图片评审、动作审片、生成请求和后续创作能力。</div>
      </div>
      <div class="stats" id="stats"></div>
      <div class="module-list" id="moduleList"></div>
    </aside>
    <main>
      <div class="mobile-switch">
        <select id="mobileModule"></select>
      </div>
      <header>
        <div>
          <h2 id="moduleTitle"></h2>
          <div class="module-desc" id="moduleDesc"></div>
        </div>
        <div class="header-actions">
          <button id="reloadModule">刷新模块</button>
          <a id="openModule" href="#" target="_blank" rel="noopener">新窗口打开</a>
        </div>
      </header>
      <section class="workspace" id="workspace"></section>
    </main>
  </div>
  <script>
    const stats = {"asset_count": 140, "sequence_count": 26, "image_review_count": 0, "sequence_review_count": 0, "job_count": 0, "source_commit": "36432df5a237e7497582447c04747c6f4c445abc", "site_base_url": "https://lihao95808.github.io/action-game-2d-art-library/"};
    const modules = [
      {
        id: "ui-review",
        name: "UI 风格评审",
        badge: "可评审",
        src: "image_review.html",
        description: "140 张 UI 风格探索图。用于评分、候选、隐藏、备注、标签，以及图片评审 JSON 同步。",
        meta: stats.asset_count + " 张图片 / 已评审 " + stats.image_review_count
      },
      {
        id: "sequence-review",
        name: "动作序列审片",
        badge: "可评审",
        src: "sequences.html",
        description: "角色选择 idle、celebrate 等动作序列。用于看动图、调 loop 参数、标记问题、写重抽帧/重生成请求。",
        meta: stats.sequence_count + " 个序列 / 已评审 " + stats.sequence_review_count + " / 请求 " + stats.job_count
      },
      {
        id: "generation-queue",
        name: "生成请求队列",
        badge: "预留",
        description: "后续用于集中展示 Seedance/GPT Image/抽帧/重生成任务状态。目前请求仍在动作序列模块中同步。",
        meta: "未来模块"
      },
      {
        id: "candidate-board",
        name: "候选与定稿看板",
        badge: "预留",
        description: "后续用于把 UI 候选、动作候选、Godot POC 采用情况汇总成制作决策面板。",
        meta: "未来模块"
      }
    ];
    const moduleList = document.getElementById("moduleList");
    const mobileModule = document.getElementById("mobileModule");
    const workspace = document.getElementById("workspace");
    const moduleTitle = document.getElementById("moduleTitle");
    const moduleDesc = document.getElementById("moduleDesc");
    const openModule = document.getElementById("openModule");
    const reloadModule = document.getElementById("reloadModule");
    let currentModule = null;

    document.getElementById("stats").innerHTML = [
      ["图片", stats.asset_count],
      ["序列", stats.sequence_count],
      ["图片评审", stats.image_review_count],
      ["动作请求", stats.job_count]
    ].map(([label, value]) => '<div class="stat"><strong>' + escapeHtml(value) + '</strong><span>' + escapeHtml(label) + '</span></div>').join("");

    for (const mod of modules) {
      const button = document.createElement("button");
      button.className = "module-button";
      button.dataset.module = mod.id;
      button.innerHTML =
        '<span class="module-badge">' + escapeHtml(mod.badge) + '</span>' +
        '<span class="module-name">' + escapeHtml(mod.name) + '</span>' +
        '<span class="module-meta">' + escapeHtml(mod.meta) + '</span>';
      button.addEventListener("click", () => activateModule(mod.id, true));
      moduleList.appendChild(button);

      const option = document.createElement("option");
      option.value = mod.id;
      option.textContent = mod.name;
      mobileModule.appendChild(option);
    }
    mobileModule.addEventListener("change", () => activateModule(mobileModule.value, true));
    reloadModule.addEventListener("click", () => activateModule(currentModule.id, false, true));

    function activateModule(id, pushHash, forceReload) {
      const mod = modules.find(item => item.id === id) || modules[0];
      currentModule = mod;
      moduleTitle.textContent = mod.name;
      moduleDesc.textContent = mod.description;
      mobileModule.value = mod.id;
      document.querySelectorAll(".module-button").forEach(button => button.classList.toggle("active", button.dataset.module === mod.id));
      if (mod.src) {
        const src = forceReload ? mod.src + "?t=" + Date.now() : mod.src;
        workspace.innerHTML = '<iframe title="' + escapeAttr(mod.name) + '" src="' + escapeAttr(src) + '"></iframe>';
        openModule.href = mod.src;
        openModule.style.display = "";
        reloadModule.disabled = false;
      } else {
        workspace.innerHTML = '<div class="empty-module"><div class="panel">' + escapeHtml(mod.description) + '<br>这个模块还没有接入独立页面，后续可以直接在发布工具的模块注册表里添加。</div></div>';
        openModule.style.display = "none";
        reloadModule.disabled = true;
      }
      if (pushHash) history.replaceState(null, "", "#" + mod.id);
    }
    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, "&#096;"); }
    activateModule((location.hash || "#ui-review").slice(1), false);
  </script>
</body>
</html>
