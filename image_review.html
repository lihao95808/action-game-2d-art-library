<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Action Game 2D 素材评审库</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1320;
      --panel: #151f2f;
      --panel2: #1c2a3f;
      --line: #304764;
      --text: #eef4ff;
      --muted: #aebdd2;
      --accent: #ffd166;
      --good: #43d17a;
      --bad: #ff6b6b;
      --blue: #65b8ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text); }
    header { position: sticky; top: 0; z-index: 20; background: rgba(13,19,32,.96); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
    .top { padding: 18px clamp(14px, 4vw, 32px); display: grid; gap: 12px; }
    .title-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav a { color: var(--text); text-decoration: none; border: 1px solid var(--line); background: var(--panel2); border-radius: 999px; padding: 7px 12px; }
    .nav a.active { background: #315f95; }
    h1 { margin: 0; font-size: clamp(22px, 4vw, 34px); letter-spacing: 0; }
    .summary { color: var(--muted); line-height: 1.65; }
    .mobile-tools-toggle { display: none; }
    .tools-panel { display: grid; gap: 10px; }
    .toolbar { display: grid; grid-template-columns: 1.7fr repeat(3, minmax(120px, .7fr)); gap: 10px; }
    input, select, textarea, button {
      width: 100%; border: 1px solid var(--line); border-radius: 8px; background: #0f1726; color: var(--text);
      min-height: 40px; padding: 8px 10px; font: inherit;
    }
    button { cursor: pointer; background: var(--panel2); touch-action: manipulation; }
    button.primary { background: #315f95; }
    button.warn { background: #543143; }
    details.sync { border: 1px solid var(--line); background: rgba(255,255,255,.025); border-radius: 8px; padding: 10px; }
    details.sync summary { cursor: pointer; color: var(--accent); }
    .sync-grid { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
    .sync-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 8px; }
    main { width: min(1640px, calc(100vw - 24px)); margin: 0 auto; padding: 18px 0 48px; }
    .stats { display: flex; flex-wrap: wrap; gap: 8px; color: var(--muted); }
    .pill { border: 1px solid var(--line); border-radius: 999px; padding: 5px 10px; background: rgba(255,255,255,.03); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .card { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: var(--panel); }
    .card[data-hidden="true"] { display: none; }
    .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #26344a; cursor: zoom-in; }
    .body { padding: 11px; display: grid; gap: 8px; }
    .idrow { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    h2 { margin: 0; font-size: 18px; }
    .meta, .small { color: var(--muted); font-size: 12px; line-height: 1.55; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag { font-size: 12px; padding: 3px 7px; border-radius: 999px; background: #263954; color: #cfe5ff; }
    .review { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .review textarea { grid-column: 1 / -1; min-height: 54px; resize: vertical; }
    .rating { display: flex; gap: 4px; }
    .rating button { min-height: 40px; padding: 4px 0; }
    .rating button.active { background: #9f711e; color: white; }
    .status-favorite { outline: 3px solid var(--accent); }
    .status-candidate { outline: 3px solid var(--blue); }
    .status-final { outline: 3px solid var(--good); }
    .status-rejected, .status-hidden { opacity: .46; }
    .modal { position: fixed; inset: 0; z-index: 50; display: none; background: rgba(0,0,0,.82); }
    .modal.open { display: grid; grid-template-columns: minmax(0, 1fr) min(420px, 36vw); }
    .preview { display: grid; place-items: center; min-width: 0; padding: 18px; }
    .preview img { max-width: 100%; max-height: calc(100vh - 36px); border: 1px solid var(--line); background: #111827; }
    .side { background: var(--panel); border-left: 1px solid var(--line); padding: 18px; overflow: auto; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0f1726; border: 1px solid var(--line); border-radius: 8px; padding: 10px; color: #cfe5ff; max-height: 38vh; overflow: auto; }
    .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .hidden-toggle { display: flex; gap: 8px; align-items: center; color: var(--muted); font-size: 13px; }
    .hidden-toggle input { width: auto; min-height: auto; }
    @media (max-width: 820px) {
      .toolbar, .sync-grid { grid-template-columns: 1fr 1fr; }
      .toolbar input { grid-column: 1 / -1; }
      .sync-actions { grid-template-columns: 1fr 1fr; }
      .modal.open { grid-template-columns: 1fr; }
      .side { max-height: 52vh; border-left: 0; border-top: 1px solid var(--line); }
      .actions { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      header { position: static; }
      .top { padding: 12px; }
      .title-row { align-items: center; }
      h1 { font-size: 20px; line-height: 1.15; }
      .summary { display: none; }
      .mobile-tools-toggle { display: block; width: auto; min-width: 118px; padding-inline: 12px; }
      .tools-panel { display: none; }
      .tools-panel.open { display: grid; gap: 8px; }
      .stats { flex-wrap: nowrap; overflow-x: auto; gap: 6px; padding-bottom: 2px; scrollbar-width: none; }
      .stats::-webkit-scrollbar { display: none; }
      .stats .pill { white-space: nowrap; font-size: 12px; padding: 4px 8px; }
      .stats .pill:nth-child(n+3) { display: none; }
      main { width: calc(100vw - 14px); padding-top: 10px; }
      .toolbar, .sync-grid, .sync-actions { grid-template-columns: 1fr; }
      .toolbar input { grid-column: auto; }
      .grid { grid-template-columns: 1fr; gap: 12px; }
      .review { grid-template-columns: 1fr; }
      input, select, textarea, button { min-height: 44px; font-size: 16px; }
      .rating button { min-height: 44px; }
      .modal { overflow: hidden; }
      .modal.open { height: 100dvh; grid-template-columns: 1fr; grid-template-rows: minmax(160px, 45dvh) minmax(0, 1fr); }
      .preview { padding: 8px; }
      .preview img { max-height: 43dvh; }
      .side { max-height: none; min-height: 0; padding: 12px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
      #closeModal { position: sticky; top: 0; z-index: 2; }
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <div>
        <div class="title-row">
          <h1>Action Game 2D 素材评审库</h1>
          <button class="mobile-tools-toggle" id="mobileToolsToggle" type="button" aria-expanded="false" aria-controls="mobileToolsPanel">筛选 / 工具</button>
        </div>
        <div class="nav">
          <a class="active" href="index.html">图片评审</a>
          <a href="sequences.html">序列帧审片</a>
        </div>
        <div class="summary">WebP 预览站。评分、候选、隐藏和备注会先保存到当前浏览器；填入 GitHub token 后可以同步到发布仓库的 JSON。</div>
      </div>
      <div class="tools-panel" id="mobileToolsPanel">
        <div class="toolbar">
          <input id="search" placeholder="搜索编号、标签、风格词、备注">
          <select id="route"><option value="">全部路线</option></select>
          <select id="status"><option value="">全部状态</option><option value="unreviewed">未评审</option><option value="favorite">收藏</option><option value="candidate">候选</option><option value="rejected">不推荐</option><option value="hidden">隐藏</option><option value="final">定稿</option></select>
          <select id="batch"><option value="">全部批次</option></select>
        </div>
        <div class="actions">
          <button class="primary" id="exportReview">导出评审 JSON</button>
          <button id="importReview">导入评审 JSON</button>
          <button class="warn" id="clearFilters">清空筛选</button>
        </div>
        <label class="hidden-toggle"><input id="showHidden" type="checkbox">显示隐藏素材</label>
        <details class="sync">
          <summary>GitHub 云同步</summary>
          <div class="sync-grid">
            <input id="cloudRepo" value="lihao95808/action-game-2d-art-library" placeholder="owner/repo">
            <input id="cloudBranch" value="main" placeholder="branch">
            <input id="cloudReviewer" value="duzuguang" placeholder="评审者">
            <input id="cloudToken" type="password" placeholder="GitHub token，仅保存在本浏览器">
          </div>
          <div class="sync-actions">
            <button id="pullCloud">拉取云端</button>
            <button class="primary" id="pushCloud">立即同步</button>
            <button id="saveCloudSettings">保存设置</button>
            <button class="warn" id="clearCloudToken">清除 Token</button>
          </div>
          <div class="small" id="syncStatus">本地已保存，尚未连接云同步。</div>
        </details>
      </div>
      <div class="stats" id="stats"></div>
    </div>
  </header>
  <main><div class="grid" id="grid"></div></main>
  <div class="modal" id="modal" aria-hidden="true">
    <div class="preview"><img id="modalImg" alt=""></div>
    <aside class="side">
      <button id="closeModal">关闭</button>
      <h2 id="modalTitle"></h2>
      <div class="small" id="modalMeta"></div>
      <div class="tags" id="modalTags"></div>
      <h3>风格词</h3>
      <pre id="modalStyle"></pre>
      <h3>Prompt</h3>
      <pre id="modalPrompt"></pre>
    </aside>
  </div>
  <input id="reviewFile" type="file" accept=".json,application/json" hidden>

          '<div class="rating">' + [1,2,3,4,5].map(n => '<button type="button" data-rate="' + n + '" class="' + (Number(r.rating)===n ? "active" : "") + '">' + n + '</button>').join("") + '</div>' +
          '<div class="review">' +
            '<select data-field="status">' + statusOptions(["unreviewed","favorite","candidate","rejected","hidden","final"], r.status || "unreviewed") + '</select>' +
            '<input data-field="tags" placeholder="评审标签" value="' + escapeAttr(r.tags || "") + '">' +
            '<textarea data-field="notes" placeholder="评审备注">' + escapeHtml(r.notes || "") + '</textarea>' +
          '</div>' +
        '</div>';
      article.querySelector("[data-open]").addEventListener("click", () => openModal(asset));
      article.querySelector("img").addEventListener("click", () => openModal(asset));
      article.querySelectorAll("[data-rate]").forEach(btn => btn.addEventListener("click", () => {
        const review = ensureReview(asset.asset_id);
        review.rating = Number(btn.dataset.rate);
        review.reviewer = cloudReviewer();
        review.reviewed_at = new Date().toISOString();
        save(); scheduleCloudSync(); render();
      }));
      article.querySelectorAll("[data-field]").forEach(input => {
        const field = input.dataset.field;
        const update = () => {
          const review = ensureReview(asset.asset_id);
          review[field] = input.value;
          review.reviewer = cloudReviewer();
          review.reviewed_at = new Date().toISOString();
          review.hidden = review.status === "hidden";
          save(); scheduleCloudSync();
        };
        if (field === "status") input.addEventListener("change", () => { update(); render(); });
        else input.addEventListener("input", update);
      });
      return article;
    }
    function statusOptions(values, selected) {
      const labels = {unreviewed:"未评审", favorite:"收藏", candidate:"候选", rejected:"不推荐", hidden:"隐藏", final:"定稿"};
      return values.map(s => '<option value="' + s + '" ' + (selected===s ? "selected" : "") + '>' + (labels[s] || s) + '</option>').join("");
    }
    function escapeHtml(value) { return String(value).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c])); }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, "&#096;"); }
    function render() {
      grid.innerHTML = "";
      const visible = assets.filter(matches);
      for (const asset of visible) grid.appendChild(card(asset));
      const reviewed = Object.values(reviews).filter(r => (r.status && r.status !== "unreviewed") || r.rating || r.notes).length;
      const pngBytes = assets.reduce((sum, a) => sum + (a.source_bytes || 0), 0);
      const previewBytes = assets.reduce((sum, a) => sum + (a.preview_bytes || 0), 0);
      document.getElementById("stats").innerHTML = [
        "素材：" + assets.length,
        "当前显示：" + visible.length,
        "已评审：" + reviewed,
        "PNG 原始约：" + mb(pngBytes) + " MB",
        "WebP 预览约：" + mb(previewBytes) + " MB"
      ].map(v => '<span class="pill">' + escapeHtml(v) + '</span>').join("");
    }
    function mb(bytes) { return (bytes / 1024 / 1024).toFixed(1); }
    function openModal(asset) {
      document.getElementById("modalImg").src = asset.preview;
      document.getElementById("modalTitle").textContent = asset.asset_id;
      document.getElementById("modalMeta").textContent = [asset.route, asset.style_id, asset.variant, asset.source_png_path].filter(Boolean).join(" / ");
      document.getElementById("modalTags").innerHTML = (asset.tags || []).map(t => '<span class="tag">' + escapeHtml(t) + '</span>').join("");
      document.getElementById("modalStyle").textContent = asset.style_prompt || asset.style_cn || "";
      document.getElementById("modalPrompt").textContent = asset.prompt || "";
      document.getElementById("modal").classList.add("open");
    }
    document.getElementById("closeModal").addEventListener("click", () => document.getElementById("modal").classList.remove("open"));
    document.getElementById("modal").addEventListener("click", e => { if (e.target.id === "modal") e.currentTarget.classList.remove("open"); });
    document.getElementById("mobileToolsToggle").addEventListener("click", () => {
      const panel = document.getElementById("mobileToolsPanel");
      const isOpen = panel.classList.toggle("open");
      document.getElementById("mobileToolsToggle").setAttribute("aria-expanded", String(isOpen));
    });
    for (const control of Object.values(filters)) control.addEventListener("input", render);
    document.getElementById("clearFilters").addEventListener("click", () => {
      filters.search.value = ""; filters.route.value = ""; filters.status.value = ""; filters.batch.value = ""; filters.showHidden.checked = false; render();
    });
    document.getElementById("exportReview").addEventListener("click", () => {
      const payload = { exported_at: new Date().toISOString(), type: "image_review", storage_key: storageKey, reviews };
      downloadJson(payload, "art_review_export.json");
    });
    document.getElementById("importReview").addEventListener("click", () => document.getElementById("reviewFile").click());
    document.getElementById("reviewFile").addEventListener("change", async event => {
      const file = event.target.files[0]; if (!file) return;
      const imported = JSON.parse(await file.text());
      reviews = mergeByTime(reviews, imported.reviews || imported);
      save(); render();
    });
    function downloadJson(payload, filename) {
      const blob = new Blob([JSON.stringify(payload, null, 2) + "\n"], {type: "application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      URL.revokeObjectURL(a.href);
    }
    function loadCloudSettings() {
      const settings = JSON.parse(localStorage.getItem(cloudSettingsKey) || "{}");
      if (settings.repo) document.getElementById("cloudRepo").value = settings.repo;
      if (settings.branch) document.getElementById("cloudBranch").value = settings.branch;
      if (settings.reviewer) document.getElementById("cloudReviewer").value = settings.reviewer;
      if (settings.token) document.getElementById("cloudToken").value = settings.token;
    }
    function saveCloudSettings() {
      localStorage.setItem(cloudSettingsKey, JSON.stringify({
        repo: document.getElementById("cloudRepo").value.trim(),
        branch: document.getElementById("cloudBranch").value.trim() || "main",
        reviewer: document.getElementById("cloudReviewer").value.trim() || "duzuguang",
        token: document.getElementById("cloudToken").value.trim()
      }));
      setSyncStatus("云同步设置已保存在本浏览器。");
    }
    function cloudReviewer() { return document.getElementById("cloudReviewer").value.trim() || "duzuguang"; }
    function cloudParts() {
      const repo = document.getElementById("cloudRepo").value.trim();
      const [owner, name] = repo.split("/");
      return {owner, repo: name, branch: document.getElementById("cloudBranch").value.trim() || "main", token: document.getElementById("cloudToken").value.trim()};
    }
    function setSyncStatus(text) { document.getElementById("syncStatus").textContent = text; }
    function scheduleCloudSync() {
      if (!document.getElementById("cloudToken").value.trim()) return;
      clearTimeout(syncTimer);
      syncTimer = setTimeout(pushCloud, 4500);
      setSyncStatus("本地已保存，等待自动同步。");
    }
    function textToBase64(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = "";
      bytes.forEach(b => binary += String.fromCharCode(b));
      return btoa(binary);
    }
    function base64ToText(text) {
      const binary = atob((text || "").replace(/\n/g, ""));
      const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }
    async function fetchGithubJson(path) {
      const c = cloudParts();
      if (!c.owner || !c.repo || !c.token) throw new Error("请先填写 GitHub token 和仓库。");
      const url = "https://api.github.com/repos/" + c.owner + "/" + c.repo + "/contents/" + path + "?ref=" + encodeURIComponent(c.branch);
      const response = await fetch(url, {headers: {Authorization: "Bearer " + c.token, Accept: "application/vnd.github+json"}});
      if (response.status === 404) return {sha: null, data: {}};
      if (!response.ok) throw new Error("GitHub 读取失败：" + response.status);
      const body = await response.json();
      return {sha: body.sha, data: JSON.parse(base64ToText(body.content || ""))};
    }
    async function putGithubJson(path, payload, message, sha) {
      const c = cloudParts();
      const url = "https://api.github.com/repos/" + c.owner + "/" + c.repo + "/contents/" + path;
      const body = {message, branch: c.branch, content: textToBase64(JSON.stringify(payload, null, 2) + "\n")};
      if (sha) body.sha = sha;
      const response = await fetch(url, {method: "PUT", headers: {Authorization: "Bearer " + c.token, Accept: "application/vnd.github+json", "Content-Type": "application/json"}, body: JSON.stringify(body)});
      if (!response.ok) throw new Error("GitHub 写入失败：" + response.status + " " + (await response.text()).slice(0, 200));
      return response.json();
    }
    async function pullCloud() {
      try {
        setSyncStatus("正在拉取云端评审...");
        const remote = await fetchGithubJson("data/review_manifest.json");
        reviews = mergeByTime(remote.data.reviews || {}, reviews);
        save(); render();
        setSyncStatus("云端已拉取并合并。");
      } catch (error) { setSyncStatus(error.message); }
    }
    async function pushCloud() {
      try {
        saveCloudSettings();
        setSyncStatus("正在同步到 GitHub...");
        const remote = await fetchGithubJson("data/review_manifest.json");
        const merged = mergeByTime(remote.data.reviews || {}, reviews);
        const payload = {updated_at: new Date().toISOString(), review_count: Object.keys(merged).length, reviews: merged};
        await putGithubJson("data/review_manifest.json", payload, "同步图片素材评审 JSON", remote.sha);
        reviews = merged;
        save(); render();
        setSyncStatus("云端已同步。");
      } catch (error) { setSyncStatus(error.message + "；本地数据未丢，可导出 JSON 兜底。"); }
    }
    document.getElementById("saveCloudSettings").addEventListener("click", saveCloudSettings);
    document.getElementById("pullCloud").addEventListener("click", pullCloud);
    document.getElementById("pushCloud").addEventListener("click", pushCloud);
    document.getElementById("clearCloudToken").addEventListener("click", () => {
      document.getElementById("cloudToken").value = "";
      saveCloudSettings();
      setSyncStatus("Token 已从本浏览器清除。");
    });
    loadCloudSettings();
    if (document.getElementById("cloudToken").value.trim()) pullCloud();
    render();
  </script>
</body>
</html>
