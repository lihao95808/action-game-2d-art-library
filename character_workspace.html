<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Action Game 2D 人物工作台</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1320;
      --panel: #151f2f;
      --panel2: #1c2a3f;
      --panel3: #22324a;
      --line: #304764;
      --text: #eef4ff;
      --muted: #aebdd2;
      --accent: #ffd166;
      --good: #43d17a;
      --bad: #ff6b6b;
      --blue: #65b8ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text); }
    button, input, select, textarea {
      font: inherit;
      color: var(--text);
      background: #0f1726;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 44px;
    }
    button { cursor: pointer; padding: 8px 12px; }
    button.primary { background: #315f95; border-color: var(--blue); }
    button.good { background: #1d6d49; border-color: var(--good); }
    button.warn { background: #68422a; border-color: #ffab6f; }
    input, select, textarea { width: 100%; padding: 9px 10px; }
    textarea { resize: vertical; min-height: 96px; line-height: 1.55; }
    a { color: var(--blue); }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(13, 19, 32, .96);
      border-bottom: 1px solid var(--line);
      padding: 14px clamp(14px, 3vw, 28px);
      display: grid;
      gap: 12px;
    }
    .title-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    h1 { margin: 0; font-size: clamp(22px, 4vw, 32px); letter-spacing: 0; }
    .summary { color: var(--muted); line-height: 1.55; max-width: 960px; }
    .nav { display: flex; gap: 8px; flex-wrap: wrap; }
    .nav a, .nav button { text-decoration: none; color: var(--text); background: var(--panel2); border: 1px solid var(--line); border-radius: 8px; min-height: 40px; padding: 8px 11px; }
    .cloud {
      display: grid;
      grid-template-columns: 1.2fr .8fr .8fr 1.4fr auto auto auto auto;
      gap: 8px;
      align-items: end;
    }
    .cloud label { display: grid; gap: 4px; color: var(--muted); font-size: 12px; }
    .status-line { color: var(--muted); font-size: 13px; min-height: 20px; }
    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) 320px;
      min-height: calc(100vh - 178px);
    }
    aside, .right-rail { border-right: 1px solid var(--line); background: #101827; padding: 14px; overflow: auto; }
    .right-rail { border-right: 0; border-left: 1px solid var(--line); }
    main { min-width: 0; padding: 16px; display: grid; gap: 14px; align-content: start; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .panel h2, .panel h3 { margin: 0 0 10px; letter-spacing: 0; }
    .panel h2 { font-size: 22px; }
    .panel h3 { font-size: 16px; }
    .muted { color: var(--muted); }
    .search-row { display: grid; gap: 8px; margin-bottom: 10px; }
    .character-list { display: grid; gap: 8px; }
    .character-card {
      width: 100%;
      text-align: left;
      display: grid;
      gap: 5px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }
    .character-card.active { border-color: var(--blue); background: #1b3350; }
    .character-card.archived { opacity: .55; }
    .pill-row, .action-row, .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .pill { display: inline-flex; align-items: center; min-height: 28px; padding: 4px 8px; border-radius: 999px; background: #263a55; color: var(--muted); font-size: 12px; }
    .pill.good { color: #061b10; background: var(--good); }
    .pill.warn { color: #201000; background: var(--accent); }
    .stage-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
    .stage-tabs button.active { background: #315f95; border-color: var(--blue); }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .field { display: grid; gap: 5px; }
    .field span { color: var(--muted); font-size: 12px; }
    .slot-assets, .sequence-grid, .job-list, .action-list { display: grid; gap: 10px; }
    .asset-card, .sequence-card, .job-card, .action-card {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.03);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .asset-card img, .sequence-card img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      background: #0b1220;
      border: 1px solid #24344d;
      border-radius: 8px;
    }
    .action-card.active { border-color: var(--blue); background: #1b3350; }
    .empty { color: var(--muted); line-height: 1.7; }
    .small { font-size: 12px; color: var(--muted); line-height: 1.45; overflow-wrap: anywhere; }
    .danger-text { color: var(--bad); }
    .file-input { display: none; }
    @media (max-width: 1120px) {
      .layout { grid-template-columns: 260px minmax(0, 1fr); }
      .right-rail { grid-column: 1 / -1; border-left: 0; border-top: 1px solid var(--line); }
      .cloud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      header { position: static; }
      .layout { grid-template-columns: 1fr; }
      aside, .right-rail { border: 0; border-bottom: 1px solid var(--line); }
      .grid-2, .grid-3, .cloud { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <header>
    <div class="title-row">
      <div>
        <h1>人物工作台</h1>
        <div class="summary">以人物为源头管理背景、人设、动作表、当前动作、Seedance 请求和序列帧结果。网页只保存草稿和任务队列，不直接调用 GPT Image 或 Seedance。</div>
      </div>
      <div class="nav">
        <a href="index.html#ui-review">UI 风格</a>
        <a href="image_review.html">图片评审</a>
        <a href="sequences.html">序列帧审片</a>
        <button id="exportWorkspace">导出 JSON</button>
        <button id="importWorkspace">导入 JSON</button>
        <input id="workspaceFile" class="file-input" type="file" accept="application/json">
      </div>
    </div>
    <div class="cloud">
      <label>GitHub 仓库<input id="cloudRepo" value="lihao95808/action-game-2d-art-library"></label>
      <label>分支<input id="cloudBranch" value="main"></label>
      <label>操作者<input id="cloudReviewer" value="duzuguang"></label>
      <label>GitHub token<input id="cloudToken" type="password" autocomplete="off" placeholder="只保存在本浏览器"></label>
      <button id="saveCloudSettings">保存设置</button>
      <button id="pullCloud">拉取云端</button>
      <button id="pushCloud">同步草稿/队列</button>
      <button id="clearCloudToken">清除 token</button>
    </div>
    <div class="status-line" id="syncStatus"></div>
  </header>
  <div class="layout">
    <aside>
      <div class="search-row">
        <input id="characterSearch" placeholder="搜索人物 / 流派 / 备注">
        <select id="statusFilter">
          <option value="all">全部状态</option>
          <option value="active">active</option>
          <option value="draft">draft</option>
          <option value="archived">archived</option>
        </select>
        <button class="primary" id="addCharacter">新增人物</button>
      </div>
      <div class="character-list" id="characterList"></div>
    </aside>
    <main>
      <div class="panel">
        <div class="stage-tabs" id="stageTabs"></div>
      </div>
      <div id="stagePanel"></div>
    </main>
    <section class="right-rail">
      <div id="focusPanel"></div>
    </section>
  </div>

      document.getElementById("queueArtJob").addEventListener("click", () => enqueueJob(jobType, c, null, {slot: slotName, prompt: slot.prompt}));
      document.getElementById("addAssetPath").addEventListener("click", () => {
        const path = prompt("图片路径（主仓库相对路径）");
        if (!path) return;
        const role = prompt("这张图的职责", slotName === "concept_art" ? "character identity reference" : "game standing idle reference") || "";
        slot.assets = slot.assets || [];
        slot.assets.push({path, role});
        c[slotName] = slot;
        saveLocal();
        renderStage();
      });
    }
    function renderActions(c) {
      document.getElementById("stagePanel").innerHTML = `
        <div class="panel">
          <h2>动作表</h2>
          <p class="muted">每个人物独立维护动作表；点击某个动作后，它会成为当前焦点，后续 Seedance 请求和序列帧审片都围绕它展开。</p>
          <div class="toolbar"><button class="primary" id="addAction">新增动作</button></div>
          <div class="action-list">
            ${c.actions.map(action => actionCard(c, action)).join("") || '<div class="empty">还没有动作。建议先建立 idle 和 celebrate，再扩展攻击、受击、移动等动作。</div>'}
          </div>
        </div>
      `;
      document.getElementById("addAction").addEventListener("click", () => {
        const id = slugify(prompt("动作 ID，例如 light_attack") || "");
        if (!id) return;
        const name = prompt("动作显示名", id) || id;
        c.actions.push(defaultAction(id, name));
        selectedActionId = id;
        activeStage = "focus";
        saveLocal();
        render();
      });
      document.querySelectorAll("[data-select-action]").forEach(button => button.addEventListener("click", () => {
        selectedActionId = button.dataset.selectAction;
        activeStage = "focus";
        saveLocal();
        render();
      }));
      document.querySelectorAll("[data-archive-action]").forEach(button => button.addEventListener("click", () => {
        const action = c.actions.find(item => item.action_id === button.dataset.archiveAction);
        if (!action) return;
        action.status = action.status === "archived" ? "active" : "archived";
        saveLocal();
        renderStage();
      }));
    }
    function renderActionFocus(c) {
      const action = selectedAction(c);
      if (!action) {
        document.getElementById("stagePanel").innerHTML = '<div class="panel empty">请先在动作表里新增或选择一个动作。</div>';
        return;
      }
      selectedActionId = action.action_id;
      document.getElementById("stagePanel").innerHTML = `
        <div class="panel">
          <h2>当前动作：${escapeHtml(action.display_name)}</h2>
          <div class="grid-3">
            ${fieldAction("display_name", "动作名", action.display_name)}
            ${selectActionField("status", "状态", action.status, ["active", "draft", "archived"])}
            ${fieldAction("current_sequence_id", "当前采用序列", action.current_sequence_id)}
          </div>
          ${areaAction("design_text", "动作设计文字版", action.design_text)}
          ${areaAction("seedance_prompt", "Seedance 2.0 提示词草稿", action.seedance_prompt)}
          <div class="toolbar">
            <button id="draftActionDesign">排队 AI 招式文字设计</button>
            <button id="buildSeedancePrompt">生成本地提示词草稿</button>
            <button class="good" id="queueSeedance">排队 Seedance 单动作视频</button>
            <button id="queueExtract">排队抽帧/重抽帧</button>
          </div>
        </div>
      `;
      bindActionFields(c, action);
      document.getElementById("draftActionDesign").addEventListener("click", () => enqueueJob("draft_action_design", c, action, {stage: "action_design"}));
      document.getElementById("buildSeedancePrompt").addEventListener("click", () => {
        action.seedance_prompt = buildSeedancePrompt(c, action);
        saveLocal();
        renderStage();
      });
      document.getElementById("queueSeedance").addEventListener("click", () => enqueueJob("video_action_seedance", c, action, {prompt: action.seedance_prompt || buildSeedancePrompt(c, action)}));
      document.getElementById("queueExtract").addEventListener("click", () => enqueueJob("extract_sequence", c, action, {current_sequence_id: action.current_sequence_id}));
    }
    function renderSequences(c) {
      const action = selectedAction(c);
      const sequences = (action && action.sequences && action.sequences.length) ? action.sequences : c.actions.flatMap(item => item.sequences || []);
      document.getElementById("stagePanel").innerHTML = `
        <div class="panel">
          <h2>序列帧层</h2>
          <p class="muted">这里按当前人物和当前动作聚合已有序列。精细 loop、问题勾选和重生成请求仍进入序列帧审片页。</p>
          <div class="toolbar"><a href="sequences.html" target="_blank" rel="noopener">打开序列帧审片页</a></div>
          <div class="sequence-grid">
            ${sequences.map(sequenceCard).join("") || '<div class="empty">当前人物/动作还没有发布过的序列帧。</div>'}
          </div>
        </div>
      `;
    }
    function renderFocus() {
      const c = selectedCharacter();
      const action = selectedAction(c);
      const relatedJobs = jobs.filter(job => c && job.character_id === c.character_id).slice(0, 8);
      document.getElementById("focusPanel").innerHTML = `
        <div class="panel">
          <h3>当前焦点</h3>
          ${c ? `<div class="pill-row"><span class="pill good">${escapeHtml(c.display_name)}</span><span class="pill">${escapeHtml(c.status)}</span></div>` : ""}
          ${action ? `<p><strong>${escapeHtml(action.display_name)}</strong><br><span class="small">${escapeHtml(action.action_id)}</span></p>` : '<p class="muted">未选动作</p>'}
          <p class="small">人物面板的所有 AI 生成按钮只写入队列；Codex/CLI 后续读取队列执行真实生图、视频生成和抽帧。</p>
        </div>
        <div class="panel">
          <h3>人物请求队列</h3>
          <div class="job-list">
            ${relatedJobs.map(jobCard).join("") || '<div class="empty">当前人物暂无请求。</div>'}
          </div>
        </div>
      `;
    }
    function enqueueJob(type, character, action, payload) {
      const createdAt = new Date().toISOString();
      const job = {
        job_id: [character.character_id, action ? action.action_id : "character", type, createdAt.replace(/[-:.TZ]/g, "")].join("_"),
        type,
        status: "pending",
        character_id: character.character_id,
        action_id: action ? action.action_id : "",
        created_at: createdAt,
        created_by: document.getElementById("cloudReviewer").value.trim() || "duzuguang",
        source: "character_workspace",
        payload: Object.assign({
          character_snapshot: minimalCharacter(character),
          action_snapshot: action ? minimalAction(action) : null
        }, payload || {}),
        notes: ""
      };
      jobs.unshift(job);
      saveLocal();
      setSyncStatus("已加入人物请求队列：" + type);
      renderFocus();
    }
    function buildSeedancePrompt(c, action) {
      const identity = [c.display_name, c.role, c.persona_text, c.action_style].filter(Boolean).join("; ");
      const actionText = action.design_text || "controlled readable action for a fighting-game character sprite";
      return [
        "Sunny Arcade Compact-Q v1, original modern-retro American sunny cartoon 2D beat-em-up game sprite.",
        "Reference role: the standing idle image is the character identity, outfit, proportions, and first-frame pose reference; keep face, outfit, hair, body size, and feet baseline consistent.",
        "Subject: " + identity,
        "Action details: " + actionText,
        "Scene: solid pure green background #00ff00, no floor, no scenery, no shadow, no reflection, no text, no watermark.",
        "Action timeline:",
        "0.0-1.25s: full body centered in orthographic side-view or near-profile side-view, start from a stable readable combat pose.",
        "1.25-3.75s: perform one clear " + action.display_name + " motion with controlled amplitude, readable hands and feet, no camera movement.",
        "3.75-5.00s: settle into a stable pose or return near the starting stance for extraction.",
        "Camera: fixed camera, no zoom, no pan, no rotation, full body always inside frame.",
        "Style and quality: clean thick ink outlines, soft cel shading, readable silhouette, stable face and hands, natural fluid motion.",
        "Constraints: no text, no watermark, no unrelated characters, no body deformation, no motion blur, no particles, no background objects."
      ].join("\n");
    }
    function minimalCharacter(c) {
      return {character_id: c.character_id, display_name: c.display_name, role: c.role, persona_text: c.persona_text, action_style: c.action_style, concept_art: c.concept_art, standing_idle: c.standing_idle};
    }
    function minimalAction(action) {
      return {action_id: action.action_id, display_name: action.display_name, design_text: action.design_text, seedance_prompt: action.seedance_prompt, current_sequence_id: action.current_sequence_id};
    }
    function buildPayload() {
      return {updated_at: new Date().toISOString(), type: "character_workspace", characters, jobs};
    }
    function field(name, label, value) {
      return `<label class="field"><span>${escapeHtml(label)}</span><input data-char-field="${escapeAttr(name)}" value="${escapeAttr(value)}"></label>`;
    }
    function fieldReadonly(name, label, value) {
      return `<label class="field"><span>${escapeHtml(label)}</span><input data-readonly="${escapeAttr(name)}" value="${escapeAttr(value)}" readonly></label>`;
    }
    function selectField(name, label, value, options) {
      return `<label class="field"><span>${escapeHtml(label)}</span><select data-char-field="${escapeAttr(name)}">${options.map(option => `<option value="${escapeAttr(option)}" ${option === value ? "selected" : ""}>${escapeHtml(option)}</option>`).join("")}</select></label>`;
    }
    function area(name, label, value) {
      return `<label class="field"><span>${escapeHtml(label)}</span><textarea data-char-field="${escapeAttr(name)}">${escapeHtml(value)}</textarea></label>`;
    }
    function selectSlotField(slot, name, label, value, options) {
      return `<label class="field"><span>${escapeHtml(label)}</span><select data-slot="${escapeAttr(slot)}" data-slot-field="${escapeAttr(name)}">${options.map(option => `<option value="${escapeAttr(option)}" ${option === value ? "selected" : ""}>${escapeHtml(option)}</option>`).join("")}</select></label>`;
    }
    function areaSlot(slot, name, label, value) {
      return `<label class="field"><span>${escapeHtml(label)}</span><textarea data-slot="${escapeAttr(slot)}" data-slot-field="${escapeAttr(name)}">${escapeHtml(value)}</textarea></label>`;
    }
    function fieldAction(name, label, value) {
      return `<label class="field"><span>${escapeHtml(label)}</span><input data-action-field="${escapeAttr(name)}" value="${escapeAttr(value)}"></label>`;
    }
    function selectActionField(name, label, value, options) {
      return `<label class="field"><span>${escapeHtml(label)}</span><select data-action-field="${escapeAttr(name)}">${options.map(option => `<option value="${escapeAttr(option)}" ${option === value ? "selected" : ""}>${escapeHtml(option)}</option>`).join("")}</select></label>`;
    }
    function areaAction(name, label, value) {
      return `<label class="field"><span>${escapeHtml(label)}</span><textarea data-action-field="${escapeAttr(name)}">${escapeHtml(value)}</textarea></label>`;
    }
    function assetCard(asset, slotName, index) {
      const img = asset.preview ? `<img src="${escapeAttr(asset.preview)}" alt="${escapeAttr(asset.role || slotName)}">` : "";
      return `<div class="asset-card">${img}<strong>${escapeHtml(asset.role || "reference")}</strong><div class="small">${escapeHtml(asset.path || "")}</div></div>`;
    }
    function actionCard(c, action) {
      return `<div class="action-card ${action.action_id === selectedActionId ? "active" : ""}">
        <div class="action-row">
          <strong>${escapeHtml(action.display_name)}</strong>
          <span class="pill">${escapeHtml(action.action_id)}</span>
          <span class="pill">${escapeHtml(action.status)}</span>
          <span class="pill">${(action.sequences || []).length} 序列</span>
        </div>
        <div class="small">${escapeHtml(action.design_text || "尚未填写动作设计")}</div>
        <div class="toolbar">
          <button data-select-action="${escapeAttr(action.action_id)}">设为当前焦点</button>
          <button data-archive-action="${escapeAttr(action.action_id)}">${action.status === "archived" ? "恢复" : "归档"}</button>
        </div>
      </div>`;
    }
    function sequenceCard(seq) {
      return `<div class="sequence-card">
        ${seq.preview ? `<img src="${escapeAttr(seq.preview)}" alt="${escapeAttr(seq.sequence_id)}">` : ""}
        <strong>${escapeHtml(seq.sequence_id)}</strong>
        <div class="pill-row"><span class="pill">${escapeHtml(seq.version || "")}</span><span class="pill">${escapeHtml(seq.frame_count || 0)} 帧</span><span class="pill">${escapeHtml(seq.playback_fps || 12)} fps</span></div>
        <div class="small">${escapeHtml(seq.metadata_path || "")}</div>
      </div>`;
    }
    function jobCard(job) {
      return `<div class="job-card">
        <strong>${escapeHtml(job.type)}</strong>
        <div class="pill-row"><span class="pill warn">${escapeHtml(job.status)}</span><span class="pill">${escapeHtml(job.action_id || "人物")}</span></div>
        <div class="small">${escapeHtml(job.created_at || "")}<br>${escapeHtml(job.job_id || "")}</div>
      </div>`;
    }
    function bindCharacterFields(c) {
      document.querySelectorAll("[data-char-field]").forEach(input => input.addEventListener("input", () => {
        c[input.dataset.charField] = input.value;
        saveLocal();
        renderCharacters();
        renderFocus();
      }));
    }
    function bindSlotFields(c, slotName) {
      c[slotName] = c[slotName] || defaultSlot();
      document.querySelectorAll("[data-slot-field]").forEach(input => input.addEventListener("input", () => {
        c[slotName][input.dataset.slotField] = input.value;
        saveLocal();
      }));
    }
    function bindActionFields(c, action) {
      document.querySelectorAll("[data-action-field]").forEach(input => input.addEventListener("input", () => {
        action[input.dataset.actionField] = input.value;
        saveLocal();
        renderFocus();
      }));
    }
    function slugify(value) {
      return String(value).trim().toLowerCase().replace(/[^a-z0-9_-]+/g, "_").replace(/^_+|_+$/g, "");
    }
    function escapeHtml(value) {
      return String(value == null ? "" : value).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[c]));
    }
    function escapeAttr(value) { return escapeHtml(value).replace(/`/g, "&#096;"); }
    function downloadJson(payload, name) {
      const blob = new Blob([JSON.stringify(payload, null, 2) + "\n"], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      a.click();
      URL.revokeObjectURL(url);
    }
    function textToBase64(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = "";
      bytes.forEach(b => binary += String.fromCharCode(b));
      return btoa(binary);
    }
    function base64ToText(text) {
      const binary = atob((text || "").replace(/\n/g, ""));
      const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }
    function loadCloudSettings() {
      const settings = JSON.parse(localStorage.getItem(cloudSettingsKey) || "{}");
      if (settings.repo) document.getElementById("cloudRepo").value = settings.repo;
      if (settings.branch) document.getElementById("cloudBranch").value = settings.branch;
      if (settings.reviewer) document.getElementById("cloudReviewer").value = settings.reviewer;
      if (settings.token) document.getElementById("cloudToken").value = settings.token;
    }
    function saveCloudSettings() {
      localStorage.setItem(cloudSettingsKey, JSON.stringify({
        repo: document.getElementById("cloudRepo").value.trim(),
        branch: document.getElementById("cloudBranch").value.trim() || "main",
        reviewer: document.getElementById("cloudReviewer").value.trim() || "duzuguang",
        token: document.getElementById("cloudToken").value.trim()
      }));
      setSyncStatus("云同步设置已保存到本浏览器。");
    }
    function cloudParts() {
      const [owner, repo] = document.getElementById("cloudRepo").value.trim().split("/");
      return {owner, repo, branch: document.getElementById("cloudBranch").value.trim() || "main", token: document.getElementById("cloudToken").value.trim()};
    }
    function setSyncStatus(text) { document.getElementById("syncStatus").textContent = text; }
    function scheduleCloudSync() {
      if (!document.getElementById("cloudToken").value.trim()) return;
      clearTimeout(syncTimer);
      syncTimer = setTimeout(pushCloud, 5000);
      setSyncStatus("本地已保存，等待自动同步。");
    }
    async function fetchGithubJson(path) {
      const c = cloudParts();
      if (!c.owner || !c.repo || !c.token) throw new Error("请先填写 GitHub token 和仓库。");
      const url = "https://api.github.com/repos/" + c.owner + "/" + c.repo + "/contents/" + path + "?ref=" + encodeURIComponent(c.branch);
      const response = await fetch(url, {headers: {Authorization: "Bearer " + c.token, Accept: "application/vnd.github+json"}});
      if (response.status === 404) return {sha: null, data: {}};
      if (!response.ok) throw new Error("GitHub 读取失败：" + response.status);
      const body = await response.json();
      return {sha: body.sha, data: JSON.parse(base64ToText(body.content || ""))};
    }
    async function putGithubJson(path, payload, message, sha) {
      const c = cloudParts();
      const url = "https://api.github.com/repos/" + c.owner + "/" + c.repo + "/contents/" + path;
      const body = {message, branch: c.branch, content: textToBase64(JSON.stringify(payload, null, 2) + "\n")};
      if (sha) body.sha = sha;
      const response = await fetch(url, {method: "PUT", headers: {Authorization: "Bearer " + c.token, Accept: "application/vnd.github+json", "Content-Type": "application/json"}, body: JSON.stringify(body)});
      if (!response.ok) throw new Error("GitHub 写入失败：" + response.status + " " + (await response.text()).slice(0, 200));
      return response.json();
    }
    async function pullCloud() {
      try {
        setSyncStatus("正在拉取人物草稿和请求队列...");
        const edits = await fetchGithubJson("data/character_edit_manifest.json");
        const remoteJobs = await fetchGithubJson("data/character_jobs.json");
        characters = mergeCharacters(characters, edits.data.characters || []);
        jobs = mergeJobs(jobs, remoteJobs.data.jobs || []);
        saveLocal();
        render();
        setSyncStatus("云端人物草稿和队列已合并。");
      } catch (error) { setSyncStatus(error.message); }
    }
    async function pushCloud() {
      try {
        saveCloudSettings();
        const editsRemote = await fetchGithubJson("data/character_edit_manifest.json");
        const jobsRemote = await fetchGithubJson("data/character_jobs.json");
        const editPayload = {schema_version: 1, updated_at: new Date().toISOString(), character_count: characters.length, characters};
        const jobPayload = {schema_version: 1, updated_at: new Date().toISOString(), job_count: jobs.length, jobs};
        await putGithubJson("data/character_edit_manifest.json", editPayload, "同步人物工作台草稿", editsRemote.sha);
        await putGithubJson("data/character_jobs.json", jobPayload, "同步人物生成请求队列", jobsRemote.sha);
        setSyncStatus("人物草稿和请求队列已同步。");
      } catch (error) { setSyncStatus(error.message + "；本地数据未丢，可先导出 JSON。"); }
    }
    document.getElementById("characterSearch").addEventListener("input", renderCharacters);
    document.getElementById("statusFilter").addEventListener("change", renderCharacters);
    document.getElementById("addCharacter").addEventListener("click", () => {
      const id = slugify(prompt("人物 ID，例如 aria_spark") || "");
      if (!id) return;
      if (characters.some(c => c.character_id === id)) { alert("人物 ID 已存在"); return; }
      const name = prompt("人物名", id) || id;
      characters.push(defaultCharacter(id, name));
      selectedCharacterId = id;
      selectedActionId = "";
      activeStage = "profile";
      saveLocal();
      render();
    });
    document.getElementById("exportWorkspace").addEventListener("click", () => downloadJson(buildPayload(), "character_workspace_export.json"));
    document.getElementById("importWorkspace").addEventListener("click", () => document.getElementById("workspaceFile").click());
    document.getElementById("workspaceFile").addEventListener("change", async event => {
      const file = event.target.files[0];
      if (!file) return;
      const imported = JSON.parse(await file.text());
      characters = mergeCharacters(characters, imported.characters || []);
      jobs = mergeJobs(jobs, imported.jobs || []);
      saveLocal();
      render();
    });
    document.getElementById("saveCloudSettings").addEventListener("click", saveCloudSettings);
    document.getElementById("pullCloud").addEventListener("click", pullCloud);
    document.getElementById("pushCloud").addEventListener("click", pushCloud);
    document.getElementById("clearCloudToken").addEventListener("click", () => {
      document.getElementById("cloudToken").value = "";
      saveCloudSettings();
      setSyncStatus("Token 已从本浏览器清除。");
    });
    loadCloudSettings();
    render();
  </script>
</body>
